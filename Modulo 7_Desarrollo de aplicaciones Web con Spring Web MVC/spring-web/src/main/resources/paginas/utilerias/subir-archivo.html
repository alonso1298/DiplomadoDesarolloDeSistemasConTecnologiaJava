<!DOCTYPE html>
<html   xmlns:th="http://www.thymeleaf.org"
        lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
    <header th:replace="~{plantillas/plantilla :: header}"></header>
    <main class="container text-center shadow-lg p-3 mb-5 bg-body-tertiary rounded">
        <h1 th:text="${contenido}"></h1>
        <form th:action="@{salvar-archivo}" method="post" enctype="multipart/form-data">
            <div class="row justify-content-center">
                <div class="col-6">
                    <input class="form-control" type="file"
                           id="imagenarchivo"
                           name="imagenarchivo" required="required">
                </div>
                <div class="col-8">
                    <br/>
                    <button type="submit" class="btn ttn-primary">Guardar</button>
                </div>
            </div>
        </form>
        <div th:if="${nombre}">
            <img th:src="@{'/modulo8/'+${nombre}}" width="20%" height="20%"><br/>
        </div>
    </main>
    <footer th:replace="~{plantillas/plantilla::footer}"></footer>
    <div th:replace="~{plantillas/plantilla::paginaScripts}"></div>
</body>
</html>
