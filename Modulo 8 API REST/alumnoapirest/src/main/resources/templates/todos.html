<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
        lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>Todos</h1>

    <div th:each="alumno : ${alumnos}" >
        <p th:text="${alumno.id + ' : ' + alumno.nombre + ' ' + alumno.apellido}" ></p>
        <a th:href="@{/portal/{id}(id=${alumno.id})}"> Ver detalle </a>
    </div>
</body>
</html>
