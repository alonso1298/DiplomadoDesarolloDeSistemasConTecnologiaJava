<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
        lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <h1>Detalle del alumno</h1>

  <div>
    <p th:text="${alumno.id}"></p>
    <p th:text="${alumno.nombre}"></p>
    <p th:text="${alumno.apellido}"></p>
    <p th:text="${alumno.correo}"></p>
    <p th:text="${alumno.promedio}"></p>
    <a th:href="@{/web/}">Regresar a todos</a>
  </div>
</body>
</html>
