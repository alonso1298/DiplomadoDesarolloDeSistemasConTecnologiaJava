<!DOCTYPE html>
<html   xmlns:th="http://www.thymeleaf.org"
        lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <h1>Todos con WebClient</h1>

  <div th:each="alumno : ${alumnos}" >
    <p th:text="${alumno.id + ' --> ' + alumno.nombre}" ></p>
    <a th:href="@{/web/{id}(id=${alumno.id})}">Ver detalle</a>
      <!--         /web/22/editar       -->
    <a th:href="@{/web/{id}/editar(id=${alumno.id})}">Editar</a>
  </div>
</body>
</html>
